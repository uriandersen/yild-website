<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>if(!sessionStorage.getItem('nda_accepted'))window.location.replace('nda.html');</script>
    <title>Request Access — YILD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --white: #FFFFFF;
            --dark: #0A0A0A;
            --heading: #0A0A0A;
            --body: #6B7280;
            --body-strong: #374151;
            --border: rgba(0,0,0,0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #000000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
        }

        .card {
            width: 100%;
            max-width: 460px;
            background: rgba(255,255,255,0.92);
            border-radius: 16px;
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(90deg, #d47ab0 0%, #c978b0 25%, #b978b0 50%, #ab78b1 75%, #a078b4 100%);
            padding: 32px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-header img {
            height: 52px;
            width: auto;
            mix-blend-mode: screen;
        }

        .card-body {
            padding: 40px;
        }

        h1 {
            font-size: 22px; font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--heading);
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px; color: var(--body);
            line-height: 1.6; margin-bottom: 28px;
        }

        .input-group { margin-bottom: 20px; }
        .input-group label {
            display: block; font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.08em;
            color: var(--body); margin-bottom: 8px;
        }
        .input-group input {
            width: 100%; padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px; font-family: inherit;
            color: var(--heading);
            background: #FAFAFA;
            transition: all 0.15s;
        }
        .input-group input:focus {
            outline: none; border-color: #a078b4;
            background: #FFF;
            box-shadow: 0 0 0 3px rgba(160,120,180,0.12);
        }

        .optional-tag {
            font-weight: 400;
            text-transform: none;
            letter-spacing: 0;
            color: rgba(107,114,128,0.6);
            font-size: 11px;
        }

        .btn-continue {
            width: 100%; padding: 14px 24px;
            background: #374151; color: var(--white);
            border: none; border-radius: 8px;
            font-size: 15px; font-weight: 600;
            font-family: inherit; cursor: pointer;
            margin-top: 4px;
            transition: opacity 0.15s;
        }
        .btn-continue:disabled {
            opacity: 0.5; cursor: not-allowed;
        }
        .btn-continue:not(:disabled):hover { opacity: 0.85; }

        .error-message {
            color: #FF5A5F; font-size: 12px;
            font-weight: 600; margin-top: 12px; display: none;
            text-align: center;
        }
        .error-message.visible { display: block; }

        .nda-footer {
            text-align: center; margin-top: 24px;
            font-size: 11px; color: rgba(107,114,128,0.6);
            letter-spacing: 0.02em;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="card-header">
        <img src="logo-rms-os-white.png" alt="YILD RMS_OS">
    </div>
    <div class="card-body">
        <h1>Request Access</h1>
        <p class="subtitle">Tell us a bit about yourself. We'll review your application and send access credentials by email.</p>

        <form id="requestForm">
            <div class="input-group">
                <label for="nameInput">Name</label>
                <input type="text" id="nameInput" placeholder="Your full name" required>
            </div>

            <div class="input-group">
                <label for="emailInput">Email</label>
                <input type="email" id="emailInput" placeholder="you@company.com" required>
            </div>

            <div class="input-group">
                <label for="companyInput">Company <span class="optional-tag">optional</span></label>
                <input type="text" id="companyInput" placeholder="Company name">
            </div>

            <button type="submit" class="btn-continue" id="submitBtn">Submit Request</button>
            <p class="error-message" id="errorMessage"></p>
        </form>

        <div class="nda-footer">YILD ApS &middot; Confidential &middot; NDA v1.0</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
    var sb = supabase.createClient(
        'https://ibjwgqpoisuvsnrxafdc.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImliandncXBvaXN1dnNucnhhZmRjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc0NDc3NjEsImV4cCI6MjA4MzAyMzc2MX0.o110GQWN3DsmdcmMVvb8o1ZVjQzcj66gsd7aeU66M-0'
    );

    var form = document.getElementById('requestForm');
    var btn = document.getElementById('submitBtn');
    var errorEl = document.getElementById('errorMessage');

    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        var name = document.getElementById('nameInput').value.trim();
        var email = document.getElementById('emailInput').value.trim();
        var company = document.getElementById('companyInput').value.trim() || null;

        if (!name || !email) return;

        btn.disabled = true;
        btn.textContent = 'Submitting\u2026';
        errorEl.classList.remove('visible');

        try {
            // Get IP address
            var ip = null;
            try {
                var ipRes = await fetch('https://api.ipify.org?format=json');
                var ipData = await ipRes.json();
                ip = ipData.ip;
            } catch (_) {}

            // Submit to Supabase
            var res = await sb.rpc('submit_access_request', {
                p_name: name,
                p_email: email,
                p_company: company,
                p_ip_address: ip,
                p_user_agent: navigator.userAgent
            });

            if (res.error) throw res.error;

            // Send Web3Forms notification
            fetch('https://api.web3forms.com/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    access_key: 'dacb730c-1766-408c-bdfc-19e6e3f58e7a',
                    subject: 'YILD Access Request',
                    message: 'Name: ' + name + '\nEmail: ' + email + '\nCompany: ' + (company || 'N/A') + '\nIP: ' + (ip || 'unknown') + '\nTime: ' + new Date().toISOString()
                })
            });

            // Store email for confirmed page
            sessionStorage.setItem('request_email', email);
            sessionStorage.setItem('request_name', name);

            window.location.href = 'confirmed.html';

        } catch (err) {
            errorEl.textContent = err.message || 'Something went wrong. Please try again.';
            errorEl.classList.add('visible');
            btn.textContent = 'Submit Request';
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
