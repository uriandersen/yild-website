<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>if(sessionStorage.getItem('yild_access')==='granted')window.location.replace('index.html');</script>
    <title>Access — YILD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --white: #FFFFFF;
            --dark: #0A0A0A;
            --heading: #0A0A0A;
            --body: #6B7280;
            --body-strong: #374151;
            --border: rgba(0,0,0,0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #000000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
        }

        .card {
            width: 100%;
            max-width: 460px;
            background: rgba(255,255,255,0.92);
            border-radius: 16px;
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(90deg, #d47ab0 0%, #c978b0 25%, #b978b0 50%, #ab78b1 75%, #a078b4 100%);
            padding: 32px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-header img {
            height: 52px;
            width: auto;
            mix-blend-mode: screen;
        }

        .card-body {
            padding: 40px;
        }

        h1 {
            font-size: 22px; font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--heading);
            margin-bottom: 12px;
        }

        .intro-text {
            font-size: 14px; color: var(--body);
            line-height: 1.7; margin-bottom: 32px;
        }

        .btn-continue {
            width: 100%; padding: 14px 24px;
            background: #374151; color: var(--white);
            border: none; border-radius: 8px;
            font-size: 15px; font-weight: 600;
            font-family: inherit; cursor: pointer;
            transition: opacity 0.15s;
            text-decoration: none;
            display: block;
            text-align: center;
        }
        .btn-continue:hover { opacity: 0.85; }

        .alt-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: var(--body);
        }
        .alt-link a {
            color: #a078b4;
            text-decoration: none;
            font-weight: 500;
        }
        .alt-link a:hover { text-decoration: underline; }

        .nda-footer {
            text-align: center; margin-top: 24px;
            font-size: 11px; color: rgba(107,114,128,0.6);
            letter-spacing: 0.02em;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="card-header">
        <img src="logo-rms-os-white.png" alt="YILD RMS_OS">
    </div>
    <div class="card-body">
        <h1>Welcome</h1>

        <p class="intro-text">
            YILD is a confidential investment platform. Access is restricted to approved evaluators under a non-disclosure agreement.
        </p>

        <a href="nda.html" class="btn-continue">Request Access</a>

        <div class="alt-link">
            Already have an access key? <a href="login.html">Sign in</a>
        </div>

        <div class="nda-footer">YILD ApS &middot; Confidential</div>
    </div>
</div>

</body>
</html>
